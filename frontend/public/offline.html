<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1d49" />
    <title>DOMUS offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 600px at 110% -10%, rgba(88, 120, 255, 0.35), transparent 60%),
          radial-gradient(900px 500px at -10% 100%, rgba(43, 79, 197, 0.3), transparent 60%),
          linear-gradient(160deg, #080f2b 0%, #131f49 55%, #1c2b5c 100%);
        color: #f3f6ff;
      }
      .offline-card {
        width: min(100%, 440px);
        padding: 28px;
        border-radius: 24px;
        background: linear-gradient(160deg, rgba(23, 40, 84, 0.88), rgba(20, 34, 72, 0.8));
        border: 1px solid rgba(149, 182, 255, 0.22);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 6vw, 40px);
      }
      p {
        margin: 0 0 12px;
        line-height: 1.5;
        color: #9fb3e1;
      }
      .offline-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        background: linear-gradient(90deg, #2ec6ff, #4e7ff3);
        color: #ffffff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="offline-card">
      <h1>DOMUS offline</h1>
      <p>O app abriu, mas a API não respondeu. Verifique sua conexão e tente novamente.</p>
      <p>O shell do sistema continua instalado. Cadastros e dados dinâmicos exigem conexão.</p>
      <span class="offline-badge">Reconectar para continuar</span>
    </main>
  </body>
  </html>
