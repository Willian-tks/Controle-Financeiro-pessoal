server {
    listen 80;
    server_name app.seudominio.com www.app.seudominio.com;

    root /var/www/controle-financeiro/frontend/dist;
    index index.html;

    client_max_body_size 20m;

    location /auth/ {
        proxy_pass http://127.0.0.1:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    location /me {
        proxy_pass http://127.0.0.1:8000/me;
        proxy_set_header Host $host;
    }

    location /workspaces {
        proxy_pass http://127.0.0.1:8000/workspaces;
        proxy_set_header Host $host;
    }

    location /accounts {
        proxy_pass http://127.0.0.1:8000/accounts;
        proxy_set_header Host $host;
    }

    location /cards {
        proxy_pass http://127.0.0.1:8000/cards;
        proxy_set_header Host $host;
    }

    location /categories {
        proxy_pass http://127.0.0.1:8000/categories;
        proxy_set_header Host $host;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8000/dashboard/;
        proxy_set_header Host $host;
    }

    location /transactions {
        proxy_pass http://127.0.0.1:8000/transactions;
        proxy_set_header Host $host;
    }

    location /credit-commitments {
        proxy_pass http://127.0.0.1:8000/credit-commitments;
        proxy_set_header Host $host;
    }

    location /card-invoices {
        proxy_pass http://127.0.0.1:8000/card-invoices;
        proxy_set_header Host $host;
    }

    location /invest/ {
        proxy_pass http://127.0.0.1:8000/invest/;
        proxy_set_header Host $host;
    }

    location /import/ {
        proxy_pass http://127.0.0.1:8000/import/;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri /index.html;
    }
}
