databases:
  - name: finance-postgres
    plan: free
    databaseName: finance_app
    user: finance_user

services:
  - type: web
    name: controle-financeiro-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: finance-postgres
          property: connectionString
      - key: BRAPI_TOKEN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: APP_PASSWORD_RESET_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
